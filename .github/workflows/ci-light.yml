name: ci-light

on:
  push:
  pull_request:

jobs:
  python-frontend-light:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Pipeline and DQ smoke
        run: |
          python -m pipelines.orchestration.airflow_dag_smoke
          python scripts/check_training_notebook.py notebooks/01_train_traffic_forecasting_model.ipynb
          python -m pipelines.transformation.run_local_pipeline --raw-dir raw --output-dir data
          python -m pipelines.quality.run_checks --layer gold --input data/gold/cleaned_traffic_features --output reports/data_quality_report.md
      - name: Python tests
        run: pytest
      - name: Frontend build
        working-directory: frontend
        run: |
          npm ci
          npm run build
